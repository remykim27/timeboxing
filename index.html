          ${isManager ? `
            <div class="scope-tabs">
              <button class="${scope === 'self' ? 'active' : ''}" data-scope="self">개인</button>
              <button class="${scope === 'team' ? 'active' : ''}" data-scope="team">팀 전체</button>
            </div>
          ` : ''}
          <div class="range-tabs">
            ${Object.entries(RANGES).map(([k, l]) => `
              <button class="${state.statsRange === k ? 'active' : ''}" data-range="${k}">${l}</button>
            `).join('')}
          </div>
        </div>
      </div>
      <div id="stats-content" style="font-size:13px;color:var(--ink-3);text-align:center;padding:40px;">불러오는 중...</div>
    </div>
  `;

  attachGlobalEvents();
  document.querySelectorAll('[data-range]').forEach(b => {
    b.onclick = async () => { state.statsRange = b.dataset.range; render(); };
  });
  document.querySelectorAll('[data-scope]').forEach(b => {
    b.onclick = async () => { state.statsScope = b.dataset.scope; render(); };
  });

  // Load data
  const allDays = {}; // date -> [tasks aggregated]
  let users = scope === 'team' ? state.roster : [state.currentUser];
  const allTaskList = []; // for counting

  for (const u of users) {
    const range = await loadRange(u.name, days);
    for (const [date, day] of Object.entries(range)) {
      if (!allDays[date]) allDays[date] = [];
      for (const t of day.tasks) {
        allDays[date].push({ ...t, _user: u.name });
        allTaskList.push({ ...t, _user: u.name, _date: date });
      }
    }
  }

  document.getElementById('stats-content').innerHTML = buildStatsContent(allDays, allTaskList, days);
  attachStatsEvents(allTaskList);
}

function buildStatsContent(allDays, allTaskList, days) {
  // KPIs
  const placedTasks = allTaskList.filter(t => t.slot !== null && t.slot !== undefined);
  const totalPlannedMin = placedTasks.reduce((s, t) => s + t.minutes, 0);
  const doneMin = placedTasks.filter(t => t.done).reduce((s, t) => s + t.minutes, 0);
  const totalTaskCount = allTaskList.length;
  const placedTaskCount = placedTasks.length;
  const completionRate = totalPlannedMin > 0 ? Math.round((doneMin / totalPlannedMin) * 100) : 0;
  const activeDays = Object.values(allDays).filter(arr => arr.length > 0).length;

  // Daily bars
  const dates = [];
  for (let i = days - 1; i >= 0; i--) dates.push(dateAdd(todayStr(), -i));
  const maxDayMin = Math.max(1, ...dates.map(d => (allDays[d] || []).filter(t => t.slot != null).reduce((s,t) => s + t.minutes, 0)));

  // Color breakdown
  const colorTotals = { blue:0, cyan:0, orange:0, green:0 };
  placedTasks.forEach(t => { colorTotals[t.color] = (colorTotals[t.color] || 0) + t.minutes; });

  // Task counting
  const taskMap = {};
  for (const t of allTaskList) {
    const key = normalizeName(t.name);
    if (!key) continue;
    if (!taskMap[key]) taskMap[key] = { name: t.name, count: 0, minutes: 0, placedCount: 0 };
    taskMap[key].count++;
    if (t.slot !== null && t.slot !== undefined) {
      taskMap[key].minutes += t.minutes;
      taskMap[key].placedCount++;
    }
  }
  const taskList = Object.values(taskMap).sort((a,b) => b.count - a.count);
  const topMin = Math.max(1, ...taskList.map(x => x.minutes));

  return `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="label">계획 시간</div>

            dayTasks.forEach(t => { totals[t.color] = (totals[t.color]||0) + t.minutes; });

            return `

          <div class="stat-rows">

              const m = colorTotals[c];

              return `<div class="stat-row">
                <span class="sw ${c}"></span><span>${v.label}</span>

      <div class="stats-tile">
        <h3>완료 vs 미완료</h3>
        ${totalPlannedMin === 0 ? '<div class="empty-table">아직 데이터가 없습니다.</div>' : `
          <div style="display:flex; gap:24px; align-items:center;">
            <div style="width:120px; height:120px; border-radius:50%; background: conic-gradient(var(--c-green) 0% ${completionRate}%, var(--surface-2) ${completionRate}% 100%); display:flex; align-items:center; justify-content:center;">

              <div style="font-size:20px; font-weight:800;">${Math.floor((totalPlannedMin-doneMin)/60)}h ${(totalPlannedMin-doneMin)%60}m</div>
            </div>
          </div>

      </div>

      <div class="stats-tile full">
        <h3 style="display:flex; align-items:center; justify-content:space-between;">
          업무 카운팅 · 자주 등록한 일

        </h3>
        ${taskList.length === 0 ? '<div class="empty-table">아직 등록된 업무가 없습니다.</div>' : `
          <table class="task-counts">
            <thead>
              <tr>
                <th>업무 이름</th>
                <th style="text-align:right;">등록 횟수</th>
                <th style="text-align:right;">배치된 횟수</th>
                <th style="text-align:right;">총 시간</th>
                <th class="bar-cell">상대 비중</th>
              </tr>
            </thead>
            <tbody>
              ${taskList.slice(0, 30).map(t => `
                <tr>
                  <td class="name-cell">${escapeHtml(t.name)}</td>
                  <td class="num-cell">${t.count}회</td>
                  <td class="num-cell">${t.placedCount}회</td>
                  <td class="num-cell">${Math.floor(t.minutes/60)}h ${t.minutes%60}m</td>
                  <td class="bar-cell"><div class="bar"><span style="width:${(t.minutes/topMin)*100}%"></span></div></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${taskList.length > 30 ? `<div style="font-size:11px; color:var(--ink-3); margin-top:10px; text-align:center;">상위 30개 표시 · 총 ${taskList.length}개의 고유 업무</div>` : ''}
        `}
      </div>
    </div>
  `;
}

function attachStatsEvents(allTaskList) {
  document.getElementById('export-counts')?.addEventListener('click', () => {
    const taskMap = {};
    for (const t of allTaskList) {
      const key = normalizeName(t.name);
      if (!key) continue;
      if (!taskMap[key]) taskMap[key] = { name: t.name, count: 0, minutes: 0, placedCount: 0 };
      taskMap[key].count++;
      if (t.slot != null) { taskMap[key].minutes += t.minutes; taskMap[key].placedCount++; }
    }
    const list = Object.values(taskMap).sort((a,b) => b.count - a.count);
    const rows = [['업무 이름', '등록 횟수', '배치된 횟수', '총 분']];
    for (const t of list) rows.push([t.name, t.count, t.placedCount, t.minutes]);
    const csv = '\uFEFF' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `업무카운팅_${state.statsRange}일_${state.statsScope}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  });
}

function renderMemberCard(m, isManager) {
  const d = state.managerData[m.name] || emptyDay();
  const totals = { blue:0, cyan:0, orange:0, green:0 };
  let totalMin = 0, doneMin = 0;
  d.tasks.forEach(t => {
    if (t.slot != null && t.color) {
      totals[t.color] += t.minutes; totalMin += t.minutes;
      if (t.done) doneMin += t.minutes;
    }
  });
  const blocks = d.tasks.filter(t => t.slot != null).map(t => {
    const sc = minutesToSlots(t.minutes);
    return `<div class="mini-block ${t.color}" style="top:${(t.slot/TOTAL_SLOTS)*100}%; height:${(sc/TOTAL_SLOTS)*100}%; opacity:${t.done ? 0.45 : 0.95};"></div>`;
  }).join('');
  const statBar = totalMin > 0
    ? `<div class="mini-stat-bar">${Object.entries(totals).map(([c,v]) => v > 0 ? `<span class="${c}" style="width:${(v/totalMin)*100}%"></span>` : '').join('')}</div>`
    : '<div class="mini-stat-bar"></div>';
  return `
    <div class="member-card" data-view-member="${escapeAttr(m.name)}">
      <div class="top">
        <div class="avatar">${escapeHtml(initials(m.name))}</div>
        <div class="name">${escapeHtml(m.name)}</div>
        ${isManager ? '<span class="role-badge">팀장</span>' : ''}
        ${m.mustChange ? '<span class="role-badge" style="background:var(--c-orange);color:white;">PIN 재설정</span>' : ''}
        <button class="menu-btn" title="더보기">⋮</button>
      </div>
      ${state.openMemberMenu === m.name ? `
        <div class="menu">
          <button data-reset-pin="${escapeAttr(m.name)}">PIN 재설정</button>
        </div>
      ` : ''}
      <div class="open-area">
        <div class="morning-snippet">
          ${d.morningPlan ? `"${escapeHtml(d.morningPlan.slice(0, 70))}${d.morningPlan.length > 70 ? '…' : ''}"` : '아직 아침 계획 없음'}
        </div>
        <div class="mini-timeline">
          ${blocks || '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--ink-3);">배치된 일정 없음</div>'}
        </div>
        ${statBar}
        <div class="footer">
          <span class="planned">${Math.floor(totalMin/60)}h ${totalMin%60}m</span>
          <span>완료 ${totalMin > 0 ? Math.round((doneMin/totalMin)*100) : 0}% · 토끼굴 ${d.rabbit}</span>
        </div>
      </div>
    </div>
  `;
}

      </div>`;
  } else if (m.type === 'requestsSend') {
    const c = m.composing;
    bd.innerHTML = `
      <div class="modal request-modal">
        <div class="modal-head">

          ${m.mode === 'send' ? `

                <button class="req-type-btn ${c.requestType === o.value ? 'active' : ''}" data-req-type="${o.value}">

            <input id="req-time" type="text" class="field-input" placeholder="예: 다음주 화요일 오후, 또는 언제든 OK" value="${escapeAttr(c.preferredTime || '')}"/>
          ` : `
            <div class="req-list">
              ${state.requests.length === 0
                ? '<div class="req-empty">보낸 요청이 없어요.</div>'

                    const meta = reqTypeMeta(r.request_type);

                      <div class="req-card ${r.status}">
                        <div class="req-head">

                            <span class="req-status ${r.status}">${statusLabel(r.status)}</span>

        </div>
      </div>`;
  } else if (m.type === 'requestsInbox') {
    const filter = m.filter || 'pending';
    const counts = {
      pending: state.requests.filter(r => r.status === 'pending').length,
      accepted: state.requests.filter(r => r.status === 'accepted').length,
      done: state.requests.filter(r => r.status === 'completed' || r.status === 'declined').length
    };
    const visible = state.requests.filter(r => {

    });
    bd.innerHTML = `
      <div class="modal request-modal">

        <div class="modal-body">
          <div class="req-tabs">
            <button class="${filter === 'pending' ? 'active' : ''}" data-inbox-tab="pending">⬤ 대기 (${counts.pending})</button>
            <button class="${filter === 'accepted' ? 'active' : ''}" data-inbox-tab="accepted">✓ 수락 (${counts.accepted})</button>
            <button class="${filter === 'done' ? 'active' : ''}" data-inbox-tab="done">완료/거절 (${counts.done})</button>
          </div>
          <div class="req-list">
            ${visible.length === 0
              ? `<div class="req-empty">${filter === 'pending' ? '대기 중인 요청이 없어요. 🎉' : '항목이 없어요.'}</div>`
              : visible.map(r => {
                  const meta = reqTypeMeta(r.request_type);
                  const showReply = m.replyingTo === r.id;
                  return `
                    <div class="req-card ${r.status}">
                      <div class="req-head">
                        <div>
                          <span class="req-from">${escapeHtml(r.from_user)}</span>
                          <span class="req-type-badge">${meta.emoji} ${meta.label}</span>
                        </div>
                        <span style="font-size:11px; color:var(--ink-3); font-family:var(--mono);">${formatRelative(r.created_at)}</span>
                      </div>
                      <div class="req-msg">${escapeHtml(r.message)}</div>
                      ${r.preferred_time ? `<div class="req-pref">⏰ 선호 시간: ${escapeHtml(r.preferred_time)}</div>` : ''}
                      ${r.manager_reply ? `<div class="req-reply"><strong>내 답변</strong><br/>${escapeHtml(r.manager_reply)}</div>` : ''}
                      <div style="margin-top:6px;"><span class="req-status ${r.status}">${statusLabel(r.status)}</span></div>
                      <div class="req-actions">
                        ${r.status === 'pending' ? `
                          <button class="accept" data-req-accept="${r.id}">✓ 수락</button>

                          <button class="reply" data-req-reply="${r.id}">💬 답변 ${r.manager_reply ? '수정' : '추가'}</button>

          <button class="cancel" id="m-cancel" style="flex:1;">닫기</button>
        </div>
      </div>`;
  } else if (m.type === 'editBlock') {
    const t = state.data.tasks.find(x => x.id === m.taskId);
    if (!t) { state.modal = null; return; }
    const placed = t.slot !== null && t.slot !== undefined;
    const durationOptions = [];
    for (let min = 15; min <= 240; min += 15) {
      durationOptions.push(`<option value="${min}" ${t.minutes === min ? 'selected' : ''}>${min}분 ${min >= 60 ? `(${Math.floor(min/60)}h${min%60 ? ` ${min%60}m` : ''})` : ''}</option>`);
    }
    const slotsNeeded = minutesToSlots(t.minutes);
    const startOptions = [];
    for (let s = 0; s + slotsNeeded <= TOTAL_SLOTS; s++) {
      startOptions.push(`<option value="${s}" ${t.slot === s ? 'selected' : ''}>${slotToTime(s)}</option>`);
    }
    bd.innerHTML = `
      <div class="modal">
        <div class="modal-head">
          <h2>일정 편집</h2>
          <p>시작·지속 시간을 15분 단위로 자유롭게 조정하세요.</p>
        </div>
        <div class="modal-body">
          <label>이름</label>
          <input id="edit-name" type="text" value="${escapeAttr(t.name)}"/>
          <label>카테고리</label>
          <div class="modal-color-pick">
            ${Object.entries(COLORS).map(([c,v]) => `
              <span class="color-dot ${c} ${t.color === c ? 'active' : ''}" data-edit-color="${c}" title="${v.label}"></span>

          </div>
          ${placed ? `
            <div class="modal-grid">

                <label>시작 시각</label>
                <select id="edit-start">${startOptions.join('')}</select>

                <label>지속 시간</label>
                <select id="edit-dur">${durationOptions.join('')}</select>
              </div>
            </div>
          ` : `

            <select id="edit-dur">${durationOptions.join('')}</select>

          <label>마감일 (선택)</label>
          <div style="display:flex; gap:6px;">
            <input id="edit-due" type="date" value="${t.dueDate || ''}" style="flex:1;"/>
            <button type="button" id="edit-due-clear" class="cancel" style="padding:0 12px; border-radius:8px; font-size:12px; flex:0;">없음</button>

          ${m.error ? `<div class="form-error">${escapeHtml(m.error)}</div>` : ''}

      </div>`;
  }

  document.body.appendChild(bd);
  bd.addEventListener('click', e => { if (e.target === bd) closeModal(); });
  document.getElementById('m-cancel')?.addEventListener('click', closeModal);

  // ESC closes
  const escHandler = e => { if (e.key === 'Escape') { closeModal(); document.removeEventListener('keydown', escHandler); } };
  document.addEventListener('keydown', escHandler);

  // Type-specific events
  if (m.type === 'alert') {
    document.getElementById('m-ok').onclick = closeModal;
  } else if (m.type === 'confirm') {
    document.getElementById('m-ok').onclick = () => m.onConfirm?.();
  } else if (m.type === 'pin') {
    const input = document.getElementById('pin-input');
    const tryIt = async () => {
      const pin = input.value.trim();
      if (!/^\d{4}$/.test(pin)) { m.error = '숫자 4자리를 입력하세요.'; render(); return; }
      const ok = await verifyPin(m.member, pin);
      if (!ok) { m.error = 'PIN이 일치하지 않습니다.'; input.value = ''; render(); document.getElementById('pin-input')?.focus(); return; }
      if (m.member.mustChange) {
        // Force new PIN setup
        openModal({ type: 'setNewPin', error: '', member: m.member });
      } else {
        closeModal();
        await enterApp(m.member);
      }
    };
    document.getElementById('m-ok').onclick = tryIt;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') tryIt(); });
    setTimeout(() => input.focus(), 50);
  } else if (m.type === 'setNewPin') {
    document.getElementById('m-ok').onclick = async () => {
      const p1 = document.getElementById('new-pin').value.trim();
      const p2 = document.getElementById('new-pin-2').value.trim();
      if (!/^\d{4}$/.test(p1)) { m.error = '숫자 4자리를 입력하세요.'; render(); return; }
      if (p1 !== p2) { m.error = '두 PIN이 일치하지 않습니다.'; render(); return; }
      const idx = state.roster.findIndex(x => x.name === m.member.name);
      const salt = uid();
      const pinHash = await hashPin(p1, salt);
      state.roster[idx] = { ...state.roster[idx], salt, pinHash, mustChange: false };
      await saveRoster();
      closeModal();
      await enterApp(state.roster[idx]);
    };
  } else if (m.type === 'changePin') {
    document.getElementById('m-ok').onclick = async () => {
      const cur = document.getElementById('cur-pin').value.trim();
      const p1 = document.getElementById('new-pin').value.trim();
      const p2 = document.getElementById('new-pin-2').value.trim();
      if (!/^\d{4}$/.test(cur) || !/^\d{4}$/.test(p1)) { m.error = '숫자 4자리를 입력하세요.'; render(); return; }
      if (p1 !== p2) { m.error = '새 PIN이 일치하지 않습니다.'; render(); return; }
      const r = await changeOwnPin(cur, p1);
      if (!r.ok) { m.error = r.error; render(); return; }
      closeModal();
      openModal({ type: 'alert', title: 'PIN 변경 완료', message: '다음 로그인부터 새 PIN을 사용하세요.' });
    };
  } else if (m.type === 'showTempPin') {
    document.getElementById('m-ok').onclick = closeModal;
    document.getElementById('m-copy').onclick = async () => {
      try {
        await navigator.clipboard.writeText(m.tempPin);
        document.getElementById('m-copy').textContent = '✓ 복사됨';
      } catch {
        document.getElementById('m-copy').textContent = '복사 실패';
      }
    };
  } else if (m.type === 'editBlock') {
    document.querySelectorAll('[data-edit-color]').forEach(d => {
      d.onclick = () => {
        document.querySelectorAll('[data-edit-color]').forEach(x => x.classList.remove('active'));
        d.classList.add('active');
      };
    });
    document.getElementById('m-ok').onclick = async () => {
      const t = state.data.tasks.find(x => x.id === m.taskId);
      if (!t) return;
      const newName = document.getElementById('edit-name').value.trim();
      if (!newName) { m.error = '이름을 입력해주세요.'; render(); return; }
      const newColor = document.querySelector('[data-edit-color].active')?.dataset.editColor || t.color;
      const newDuration = parseInt(document.getElementById('edit-dur').value);
      const startEl = document.getElementById('edit-start');
      const placed = t.slot !== null && t.slot !== undefined;
      let newSlot = t.slot;
      if (placed && startEl) {
        newSlot = parseInt(startEl.value);
        const slotsCount = minutesToSlots(newDuration);
        if (newSlot + slotsCount > TOTAL_SLOTS) {
          m.error = `${slotToTime(newSlot)}에서 ${newDuration}분은 ${HOUR_END}:00을 넘습니다.`; render(); return;
        }
        const overlap = findOverlap(t.id, newSlot, slotsCount);
        if (overlap) { m.error = `'${overlap.name}'와 시간이 겹칩니다.`; render(); return; }
      }
      const newDue = document.getElementById('edit-due').value || null;
      t.name = newName; t.color = newColor; t.minutes = newDuration; t.slot = newSlot; t.dueDate = newDue;
      saveDay(); closeModal(); render();
    };
    document.getElementById('edit-due-clear')?.addEventListener('click', () => {
      document.getElementById('edit-due').value = '';
    });
    document.getElementById('edit-delete').onclick = () => {
      const t = state.data.tasks.find(x => x.id === m.taskId);
      if (!t) return;
      state.data.tasks = state.data.tasks.filter(x => x.id !== m.taskId);
      saveDay(); closeModal(); render();
    };
    document.getElementById('edit-dup').onclick = () => {
      const t = state.data.tasks.find(x => x.id === m.taskId);
      if (!t) return;
      const copy = { ...t, id: uid(), slot: null, done: false, pendingSlot: null, fromTemplate: null };
      state.data.tasks.push(copy);
      saveDay(); closeModal(); render();
    };
    document.getElementById('edit-unplace')?.addEventListener('click', () => {
      const t = state.data.tasks.find(x => x.id === m.taskId);
      if (!t) return;
      t.slot = null;
      t.pendingSlot = null;
      saveDay(); closeModal(); render();
    });
  } else if (m.type === 'search') {
    handleSearchModal(m);
  } else if (m.type === 'repeats') {
    handleRepeatsModal(m);
  } else if (m.type === 'requestsSend') {
    handleRequestsSendModal(m);
  } else if (m.type === 'requestsInbox') {
    handleRequestsInboxModal(m);
  }
}

function handleRequestsSendModal(m) {
  // Tab switching
  document.querySelectorAll('[data-tab]').forEach(b => {
    b.onclick = () => { m.mode = b.dataset.tab; render(); };
  });
  if (m.mode === 'send') {
    // Type selection
    document.querySelectorAll('[data-req-type]').forEach(b => {
      b.onclick = () => {
        m.composing.requestType = b.dataset.reqType;
        document.querySelectorAll('[data-req-type]').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      };
    });
    // Track input live (so tab switch doesn't lose draft)
    const msgEl = document.getElementById('req-msg');
    const timeEl = document.getElementById('req-time');
    msgEl?.addEventListener('input', () => { m.composing.message = msgEl.value; });
    timeEl?.addEventListener('input', () => { m.composing.preferredTime = timeEl.value; });
    // Send
    document.getElementById('req-send')?.addEventListener('click', async () => {
      const msg = (msgEl?.value || '').trim();
      if (!msg) { showError('메시지를 입력해주세요.'); return; }
      const created = await createRequest({
        requestType: m.composing.requestType,
        message: msg,
        preferredTime: (timeEl?.value || '').trim()
      });
      if (created) {
        state.requests.unshift(created);
        // Switch to "mine" tab to show the new request
        m.mode = 'mine';
        m.composing = { requestType: 'tea', message: '', preferredTime: '' };
        render();
        // Optionally show a success toast — for now, the tab switch is feedback
      }
    });
  } else {
    // Cancel a sent request (only pending)
    document.querySelectorAll('[data-req-cancel]').forEach(b => {
      b.onclick = async () => {
        const id = b.dataset.reqCancel;
        await deleteRequest(id);
        state.requests = state.requests.filter(r => r.id !== id);
        render();
      };
    });
  }
}

function handleRequestsInboxModal(m) {
  // Tab switching
  document.querySelectorAll('[data-inbox-tab]').forEach(b => {
    b.onclick = () => { m.filter = b.dataset.inboxTab; m.replyingTo = null; render(); };
  });
  // Accept
  document.querySelectorAll('[data-req-accept]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.reqAccept;
      const ok = await updateRequestStatus(id, 'accepted');
      if (ok) {
        const r = state.requests.find(x => x.id === id);
        if (r) r.status = 'accepted';
        state.pendingRequestCount = state.requests.filter(x => x.status === 'pending').length;
        render();
      }
    };
  });
  // Decline
  document.querySelectorAll('[data-req-decline]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.reqDecline;
      const ok = await updateRequestStatus(id, 'declined');
      if (ok) {
        const r = state.requests.find(x => x.id === id);
        if (r) r.status = 'declined';
        state.pendingRequestCount = state.requests.filter(x => x.status === 'pending').length;
        render();
      }
    };
  });
  // Complete
  document.querySelectorAll('[data-req-complete]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.reqComplete;
      const ok = await updateRequestStatus(id, 'completed');
      if (ok) {
        const r = state.requests.find(x => x.id === id);
        if (r) r.status = 'completed';
        render();
      }
    };
  });
  // Reply (open form)
  document.querySelectorAll('[data-req-reply]').forEach(b => {
    b.onclick = () => { m.replyingTo = b.dataset.reqReply; render(); };
  });
  // Reply save
  document.querySelectorAll('[data-reply-save]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.replySave;
      const text = document.getElementById(`reply-text-${id}`)?.value?.trim() || '';
      const r = state.requests.find(x => x.id === id);
      if (!r) return;
      const ok = await updateRequestStatus(id, r.status, text);
      if (ok) {
        r.manager_reply = text;
        m.replyingTo = null;
        render();
      }
    };
  });
  // Reply cancel
  document.querySelectorAll('[data-reply-cancel]').forEach(b => {
    b.onclick = () => { m.replyingTo = null; render(); };
  });
  // Delete (only done items)
  document.querySelectorAll('[data-req-delete]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.reqDelete;
      await deleteRequest(id);
      state.requests = state.requests.filter(r => r.id !== id);
      render();
    };
  });
}

function handleSearchModal(m) {
  const input = document.getElementById('search-input');
  if (input) {
    input.oninput = () => { m.query = input.value; runSearch(); };
    // focus는 모달이 막 열렸을 때만 (값이 비어있을 때)
    if (!m.query) {
      setTimeout(() => input.focus(), 50);
    } else {
      // 이미 값이 있으면 (다른 이유로 render된 경우) cursor 끝으로
      setTimeout(() => {
        input.focus();
        const v = input.value;
        input.setSelectionRange(v.length, v.length);
      }, 50);
    }
  }
  // 결과 클릭 핸들러는 renderSearchResultsOnly에서도 등록되지만, 첫 로드 시에도 등록
  document.querySelectorAll('[data-go-date]').forEach(el => {
    el.onclick = async () => {
      const date = el.dataset.goDate;
      state.currentDate = date;
      state.calendarMonth = date.slice(0, 7);
      await reloadMonthCalendar();
      state.data = await loadDay(state.currentUser.name, date);
      state.subview = 'daily';
      closeModal(); render();
    };
  });
}

function handleRepeatsModal(m) {
  const typeSel = document.getElementById('rep-type');
  const daysPicker = document.getElementById('rep-days');
  const toggleDays = () => { if (daysPicker) daysPicker.style.display = typeSel.value === 'custom' ? 'flex' : 'none'; };
  if (typeSel) { typeSel.onchange = toggleDays; toggleDays(); }
  const selectedDays = new Set();
  document.querySelectorAll('[data-rep-dow]').forEach(b => {
    b.onclick = () => {
      const d = parseInt(b.dataset.repDow);
      if (selectedDays.has(d)) { selectedDays.delete(d); b.classList.remove('active'); }
      else { selectedDays.add(d); b.classList.add('active'); }
    };
  });
  document.getElementById('rep-add')?.addEventListener('click', async () => {
    const name = document.getElementById('rep-name').value.trim();
    const color = document.getElementById('rep-color').value;
    const minutes = parseInt(document.getElementById('rep-minutes').value);
    const repeatType = document.getElementById('rep-type').value;
    const startVal = document.getElementById('rep-start').value;
    const startSlot = startVal === '' ? null : parseInt(startVal);
    if (!name) { showError('업무 이름을 입력해주세요.'); return; }
    let repeatDays = [];
    if (repeatType === 'custom') {
      repeatDays = Array.from(selectedDays).sort();
      if (repeatDays.length === 0) { showError('요일을 하나 이상 선택해주세요.'); return; }
    }
    const newT = { name, color, minutes, repeatType, repeatDays, startSlot, active: true };
    const id = await saveRepeatTemplate(newT);
    if (id) {
      newT.id = id;
      state.repeatTemplates.push(newT);
      await applyRepeatsForToday();
      render();
    }
  });
  document.querySelectorAll('[data-rep-toggle]').forEach(b => {
    b.onclick = async () => {
      const t = state.repeatTemplates.find(x => x.id === b.dataset.repToggle);
      if (!t) return;
      t.active = !t.active;
      await saveRepeatTemplate(t);
      render();
    };
  });
  document.querySelectorAll('[data-rep-del]').forEach(b => {
    b.onclick = async () => {
      const id = b.dataset.repDel;
      await deleteRepeatTemplate(id);
      state.repeatTemplates = state.repeatTemplates.filter(x => x.id !== id);
      state.data.tasks = state.data.tasks.filter(t => t.fromTemplate !== id);
      await saveDay();
      render();
    };
  });
}

/* ============================================================
   BOOT
============================================================ */
async function boot() {
  // Check config
  if (SUPABASE_URL.includes('YOUR_SUPABASE_URL') || SUPABASE_KEY.includes('YOUR_SUPABASE_KEY')) {
    document.getElementById('app').innerHTML = `
      <div style="max-width:520px;margin:80px auto;padding:30px;background:#FEEAEA;border-radius:12px;border:2px solid #E14B4B;font-family:'Pretendard',sans-serif;">
        <h2 style="color:#E14B4B;font-size:18px;margin-bottom:14px;">⚠️ Supabase 설정 필요</h2>
        <p style="font-size:14px;color:#4A5468;line-height:1.6;margin-bottom:12px;">
          HTML 파일을 텍스트 에디터(메모장)로 열어, 파일 상단의 <code style="background:#fff;padding:2px 6px;border-radius:4px;">SUPABASE_URL</code>과 
          <code style="background:#fff;padding:2px 6px;border-radius:4px;">SUPABASE_KEY</code>를 본인의 Supabase 프로젝트 값으로 바꾸세요.
        </p>
        <p style="font-size:13px;color:#8A93A6;">바꾼 뒤 다시 Netlify에 끌어다 놓으세요.</p>
      </div>
    `;
    return;
  }
  await loadRoster();
  const remembered = getRememberedUser();
  if (remembered) {
    const full = state.roster.find(m => m.name === remembered.name);
    if (full) {
      if (full.mustChange) {
        // Force PIN re-entry → setNewPin flow
        state.view = 'login';
        render();
        return;
      }
      await enterApp(full);
      return;
    }
  }
  state.view = 'login';
  render();
}

// 세션 만료 주기적 체크 (30분마다)
setInterval(() => {
  if (state.view !== 'app' || !state.currentUser) return;
  const sessionStart = localStorage.getItem('timeboxing_session_start');
  if (!sessionStart) return;
  const elapsed = (Date.now() - new Date(sessionStart).getTime()) / (1000 * 60 * 60);
  if (elapsed > SESSION_MAX_HOURS) {
    rememberUser(null);
    state.currentUser = null;
    state.view = 'login';
    render();
    openModal({
      type: 'alert',
      title: '세션이 만료되었습니다',
      message: `보안을 위해 ${SESSION_MAX_HOURS}시간이 지나면 자동 로그아웃됩니다. 다시 로그인해주세요.`
    });
  }
}, 30 * 60 * 1000);

boot();
</script>
